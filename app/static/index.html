<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ABOUTUS Network Monitor</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="brand" aria-label="ABOUTUS Network Monitor">
          <div class="brand-mark" aria-hidden="true">
            <span data-icon="network"></span>
          </div>
        </div>

        <nav class="nav-list" aria-label="Primary navigation">
          <button class="nav-item active" type="button" data-route="overview">
            <span class="nav-icon" data-icon="dashboard"></span>
            <span>Overview</span>
          </button>
          <button class="nav-item" type="button" data-route="devices">
            <span class="nav-icon" data-icon="devices"></span>
            <span>Devices</span>
          </button>
          <button class="nav-item" type="button" data-route="topology">
            <span class="nav-icon" data-icon="topology"></span>
            <span>Topology</span>
          </button>
          <button class="nav-item" type="button" data-route="settings">
            <span class="nav-icon" data-icon="settings"></span>
            <span>Settings</span>
          </button>
        </nav>

        <div class="header-actions">
          <button id="settingsButton" class="icon-button" type="button" aria-label="Open settings" title="Open settings">
            <span data-icon="settings"></span>
          </button>
          <button id="refreshButton" class="primary-button" type="button">
            <span data-icon="refresh"></span>
            <span>Refresh</span>
          </button>
        </div>
      </header>

      <section class="page-heading">
        <h2 id="pageTitle">Overview</h2>
        <div class="status-bar" aria-label="Dashboard status">
          <span class="status-chip">
            <span data-icon="clock"></span>
            <span id="systemClock">--:--:--</span>
          </span>
          <span class="status-chip refresh-chip">
            <span data-icon="timer"></span>
            <span id="refreshCountdown">--s</span>
            <span id="refreshProgress" class="refresh-progress" aria-hidden="true"></span>
          </span>
          <span id="lastUpdated" class="status-chip timestamp">Not updated yet</span>
        </div>
      </section>

      <main id="pageContent" class="content" tabindex="-1"></main>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
