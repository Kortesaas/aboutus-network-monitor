station:
  name: aboutus-network-monitor
  ip_address: 192.168.99.10
  vlan: MGMT

check_defaults:
  timeout_seconds: 1.5
  ping_count: 1

discovery:
  enabled: true
  tool: nmap
  scan_interval_seconds: 60
  timeout_seconds_per_subnet: 15
  resolve_dns: false
  max_retries: 1
  host_timeout: 5s
  max_parallel_scans: 2

infrastructure:
  - id: lancom-router
    name: LANCOM 1783VAW
    role: Router
    model: LANCOM 1783VAW
    ip_address: 192.168.99.1
    web_url: http://192.168.99.1
    vlan: MGMT
    check:
      type: ping

  - id: foh-switch
    name: FOH AT-GS950/48
    role: FOH core switch
    model: Allied Telesis AT-GS950/48
    ip_address: 192.168.99.2
    web_url: http://192.168.99.2
    vlan: MGMT
    check:
      type: ping

  - id: stage-switch
    name: Stage TL-SG1016PE
    role: Stage switch
    model: TP-Link TL-SG1016PE
    ip_address: 192.168.99.3
    web_url: http://192.168.99.3
    vlan: MGMT
    check:
      type: ping

internet:
  probes:
    - name: Cloudflare DNS
      type: ping
      target: 1.1.1.1
    - name: Google DNS
      type: ping
      target: 8.8.8.8
    - name: HTTPS probe
      type: https
      target: https://www.google.com/generate_204

vlans:
  - id: 10
    name: CONTROL
    subnet: 192.168.10.0/24
    gateway: 192.168.10.1
  - id: 20
    name: AUDIO
    subnet: 192.168.20.0/24
    gateway: 192.168.20.1
  - id: 30
    name: LASER
    subnet: 192.168.30.0/24
    gateway: 192.168.30.1
  - id: 40
    name: LIGHTING
    subnet: 192.168.40.0/24
    gateway: 192.168.40.1
  - id: 50
    name: VIDEO
    subnet: 192.168.50.0/24
    gateway: 192.168.50.1
  - id: 99
    name: MGMT
    subnet: 192.168.99.0/24
    gateway: 192.168.99.1

inventory:
  - id: aboutus-pi
    name: ABOUTUS Network Monitor Pi
    ip: 192.168.99.10
    vlan: MGMT
    role: monitor
    expected: true
    hostname: aboutus-network-monitor
    vendor: Raspberry Pi
    mac_address:
    connected_switch: Unknown
    connected_port: Unknown
    mac_source: Unknown
    switch_port_confidence: Unknown
    discovery_sources:
      - inventory
    status_check:
      type: ping

  - id: lancom-router
    name: LANCOM Router
    ip: 192.168.99.1
    web_url: http://192.168.99.1
    vlan: MGMT
    role: router
    expected: true
    vendor: LANCOM Systems
    mac_address:
    connected_switch: Unknown
    connected_port: Unknown
    mac_source: Unknown
    switch_port_confidence: Unknown
    discovery_sources:
      - inventory
    status_check:
      type: ping

  - id: foh-switch
    name: FOH Switch AT-GS950/48
    ip: 192.168.99.2
    web_url: http://192.168.99.2
    vlan: MGMT
    role: switch
    expected: true
    vendor: Allied Telesis
    mac_address:
    connected_switch: Unknown
    connected_port: Unknown
    mac_source: Unknown
    switch_port_confidence: Unknown
    discovery_sources:
      - inventory
    status_check:
      type: ping

  - id: stage-switch
    name: Stage Switch TL-SG1016PE
    ip: 192.168.99.3
    web_url: http://192.168.99.3
    vlan: MGMT
    role: switch
    expected: true
    vendor: TP-Link
    mac_address:
    connected_switch: Unknown
    connected_port: Unknown
    mac_source: Unknown
    switch_port_confidence: Unknown
    discovery_sources:
      - inventory
    status_check:
      type: ping
