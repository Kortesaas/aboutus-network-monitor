station:
  name: aboutus-network-monitor
  ip_address: 192.168.99.10
  vlan: MGMT

check_defaults:
  timeout_seconds: 1.5
  ping_count: 1

discovery:
  enabled: true
  tool: nmap
  scan_interval_seconds: 60
  timeout_seconds_per_subnet: 15
  resolve_dns: false
  max_retries: 1
  host_timeout: 5s
  max_parallel_scans: 2

ui:
  vlan_colors:
    "10":
      color: "#0d8df2"
      dark: "#07579f"
      text: "#ffffff"
    "20":
      color: "#00c822"
      dark: "#00750d"
      text: "#ffffff"
    "30":
      color: "#df1726"
      dark: "#9b101a"
      text: "#ffffff"
    "40":
      color: "#a52ab6"
      dark: "#681675"
      text: "#ffffff"
    "50":
      color: "#ef790d"
      dark: "#844500"
      text: "#ffffff"
    "99":
      color: "#f4f5f7"
      dark: "#cfd4da"
      text: "#101820"
  port_role_colors:
    stage:
      color: "#f3d21b"
      dark: "#b79700"
      text: "#090909"
    router:
      color: "#050505"
      dark: "#000000"
      text: "#f3d21b"
    trunk:
      color: "#f3d21b"
      dark: "#b79700"
      text: "#090909"
    unknown:
      color: "#27303a"
      dark: "#151a21"
      text: "#a8b3bf"

snmp:
  enabled: true
  version: "2c"
  community_env: ABOUTUS_SNMP_COMMUNITY
  timeout_seconds: 2
  retries: 0
  max_parallel_hosts: 2
  poll_interfaces: true
  poll_fdb: true
  poll_q_bridge: true
  poll_poe: false
  targets:
    - foh-switch
  # Switch-port locations are only treated as exact when the port is listed here.
  trusted_edge_ports:
    foh-switch:
      - "48"
  uplink_ports:
    foh-switch:
      - "41"
      - "47"

switches:
  - id: foh-switch
    name: FOH AT-GS950/48
    model: Allied Telesis AT-GS950/48
    ip_address: 192.168.99.2
    port_count: 48
    layout:
      columns: 24
      rows: 2
    ports:
      "41":
        label: Stage trunk
        role: downstream trunk
        type: downstream
        expected_vlans: [10, 20, 30, 40, 50, 99]
        native_vlan: 99
        pvid: 99
        uplink: true
        notes: Carries VLANs toward stage/downstream switch.
      "47":
        label: LANCOM router trunk
        role: router trunk
        type: trunk
        expected_vlans: [10, 20, 30, 40, 50, 99]
        native_vlan: 99
        pvid: 99
        uplink: true
        notes: Core trunk to LANCOM router.
      "48":
        label: Monitor Pi
        role: management access
        type: mgmt
        expected_vlans: [99]
        native_vlan: 99
        pvid: 99
        notes: MGMT access port for ABOUTUS Network Monitor Pi.

  - id: stage-switch
    name: Stage TL-SG1016PE
    model: TP-Link TL-SG1016PE
    ip_address: 192.168.99.3
    port_count: 16
    layout:
      columns: 8
      rows: 2
    snmp_enabled: false
    ports:
      "1":
        label: CTRL
        role: CONTROL access
        type: access
        expected_vlans: [10]
        native_vlan: 10
        pvid: 10
        notes: Manual fallback stage port assignment.
      "2":
        label: CTRL
        role: CONTROL access
        type: access
        expected_vlans: [10]
        native_vlan: 10
        pvid: 10
        notes: Manual fallback stage port assignment.
      "3":
        label: AUDIO
        role: AUDIO access
        type: access
        expected_vlans: [20]
        native_vlan: 20
        pvid: 20
        notes: Manual fallback stage port assignment.
      "4":
        label: AUDIO
        role: AUDIO access
        type: access
        expected_vlans: [20]
        native_vlan: 20
        pvid: 20
        notes: Manual fallback stage port assignment.
      "5":
        label: AUDIO
        role: AUDIO access
        type: access
        expected_vlans: [20]
        native_vlan: 20
        pvid: 20
        notes: Manual fallback stage port assignment.
      "6":
        label: AUDIO
        role: AUDIO access
        type: access
        expected_vlans: [20]
        native_vlan: 20
        pvid: 20
        notes: Manual fallback stage port assignment.
      "7":
        label: LASER
        role: LASER access
        type: access
        expected_vlans: [30]
        native_vlan: 30
        pvid: 30
        notes: Manual fallback stage port assignment.
      "8":
        label: LASER
        role: LASER access
        type: access
        expected_vlans: [30]
        native_vlan: 30
        pvid: 30
        notes: Manual fallback stage port assignment.
      "9":
        label: LIGHTING
        role: LIGHTING access
        type: access
        expected_vlans: [40]
        native_vlan: 40
        pvid: 40
        notes: Manual fallback stage port assignment.
      "10":
        label: LIGHTING
        role: LIGHTING access
        type: access
        expected_vlans: [40]
        native_vlan: 40
        pvid: 40
        notes: Manual fallback stage port assignment.
      "11":
        label: LIGHTING
        role: LIGHTING access
        type: access
        expected_vlans: [40]
        native_vlan: 40
        pvid: 40
        notes: Manual fallback stage port assignment.
      "12":
        label: LIGHTING
        role: LIGHTING access
        type: access
        expected_vlans: [40]
        native_vlan: 40
        pvid: 40
        notes: Manual fallback stage port assignment.
      "13":
        label: VIDEO
        role: VIDEO access
        type: access
        expected_vlans: [50]
        native_vlan: 50
        pvid: 50
        notes: Manual fallback stage port assignment.
      "14":
        label: VIDEO
        role: VIDEO access
        type: access
        expected_vlans: [50]
        native_vlan: 50
        pvid: 50
        notes: Manual fallback stage port assignment.
      "15":
        label: FOH uplink
        role: FOH uplink
        type: trunk
        expected_vlans: [10, 20, 30, 40, 50, 99]
        native_vlan: 99
        pvid: 99
        uplink: true
        notes: Manual fallback until TP-Link SNMP support is confirmed.
      "16":
        label: MGMT access
        role: management access
        type: mgmt
        expected_vlans: [99]
        native_vlan: 99
        pvid: 99
        notes: Manual fallback port role.

infrastructure:
  - id: lancom-router
    name: LANCOM 1783VAW
    role: Router
    model: LANCOM 1783VAW
    ip_address: 192.168.99.1
    web_url: http://192.168.99.1
    vlan: MGMT
    snmp_enabled: false
    check:
      type: ping

  - id: foh-switch
    name: FOH AT-GS950/48
    role: FOH core switch
    model: Allied Telesis AT-GS950/48
    ip_address: 192.168.99.2
    web_url: http://192.168.99.2
    vlan: MGMT
    snmp_enabled: true
    check:
      type: ping

  - id: stage-switch
    name: Stage TL-SG1016PE
    role: Stage switch
    model: TP-Link TL-SG1016PE
    ip_address: 192.168.99.3
    web_url: http://192.168.99.3
    vlan: MGMT
    snmp_enabled: false
    check:
      type: ping

internet:
  probes:
    - name: Cloudflare DNS
      type: ping
      target: 1.1.1.1
    - name: Google DNS
      type: ping
      target: 8.8.8.8
    - name: HTTPS probe
      type: https
      target: https://www.google.com/generate_204

vlans:
  - id: 10
    name: CONTROL
    subnet: 192.168.10.0/24
    gateway: 192.168.10.1
  - id: 20
    name: AUDIO
    subnet: 192.168.20.0/24
    gateway: 192.168.20.1
  - id: 30
    name: LASER
    subnet: 192.168.30.0/24
    gateway: 192.168.30.1
  - id: 40
    name: LIGHTING
    subnet: 192.168.40.0/24
    gateway: 192.168.40.1
  - id: 50
    name: VIDEO
    subnet: 192.168.50.0/24
    gateway: 192.168.50.1
  - id: 99
    name: MGMT
    subnet: 192.168.99.0/24
    gateway: 192.168.99.1

inventory:
  - id: aboutus-pi
    name: ABOUTUS Network Monitor Pi
    ip: 192.168.99.10
    vlan: MGMT
    role: monitor
    expected: true
    hostname: aboutus-network-monitor
    vendor: Raspberry Pi
    mac_address:
    connected_switch: Unknown
    connected_port: Unknown
    mac_source: Unknown
    switch_port_confidence: Unknown
    discovery_sources:
      - inventory
    status_check:
      type: ping

  - id: lancom-router
    name: LANCOM Router
    ip: 192.168.99.1
    web_url: http://192.168.99.1
    vlan: MGMT
    role: router
    expected: true
    vendor: LANCOM Systems
    mac_address:
    connected_switch: Unknown
    connected_port: Unknown
    mac_source: Unknown
    switch_port_confidence: Unknown
    discovery_sources:
      - inventory
    status_check:
      type: ping

  - id: foh-switch
    name: FOH Switch AT-GS950/48
    ip: 192.168.99.2
    web_url: http://192.168.99.2
    vlan: MGMT
    role: switch
    expected: true
    vendor: Allied Telesis
    mac_address:
    connected_switch: Unknown
    connected_port: Unknown
    mac_source: Unknown
    switch_port_confidence: Unknown
    discovery_sources:
      - inventory
    status_check:
      type: ping

  - id: stage-switch
    name: Stage Switch TL-SG1016PE
    ip: 192.168.99.3
    web_url: http://192.168.99.3
    vlan: MGMT
    role: switch
    expected: true
    vendor: TP-Link
    mac_address:
    connected_switch: Unknown
    connected_port: Unknown
    mac_source: Unknown
    switch_port_confidence: Unknown
    discovery_sources:
      - inventory
    status_check:
      type: ping
